services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: strategy-docs
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8765:8000"
    volumes:
      - ${PROJECT_SOURCE_PATH}:/project
      - ./app:/app/app
      - ./scripts:/app/scripts
    environment:
      PROJECT_DIR: /project
      APP_TITLE: Renewals Manager
      SOURCE_PATH: ${PROJECT_SOURCE_PATH}
      HOME: /tmp
    restart: unless-stopped
