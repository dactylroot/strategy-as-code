<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>{% block title %}{{ app_title }}{% endblock %}</title>
  <script>
  (function() {
    var EMBED_CHROME = {{ 'true' if embed_chrome else 'false' }};
    if (EMBED_CHROME) return; // waits for the host's postMessage instead
    var mode = 'dark';
    try { mode = localStorage.getItem('strategy-as-code-theme') || 'dark'; } catch (e) {}
    if (mode === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-json-enc@2.0.1/json-enc.js" defer></script>
  <style>
    :root {
      /* Base surfaces (dark, default) - navy palette matches renewals-web-react's
         theme/index.ts: NAVY (page) < NAVY_SURFACE (header/sidebar) < NAVY_ELEVATED
         (card), solid panels rather than translucent glass, no card blur/shadow */
      --color-bg-base:        #0d1b2a;
      --color-bg-surface:     #132337;
      --color-bg-card:        #1a2e45;
      --color-bg-card-hover:  #22374d;
      --color-border-subtle:  rgba(30,58,95,0.55);
      --color-border-muted:   #1e3a5f;
      --card-blur:            none;
      --card-shadow:          none;

      /* Text */
      --color-text-primary:   #e8f4fd;
      --color-text-secondary: #90caf9;
      --color-text-muted:     #4a5568;

      /* Brand / categorical */
      --color-t3-blue:        #00a3ff;
      --color-t3-blue-dim:    rgba(0,163,255,0.15);
      --color-t3-blue-border: rgba(0,163,255,0.3);
      --color-teal:           #00c4b4;
      --color-purple:         #8b5cf6;
      --color-amber:          #f59e0b;
      --color-red:            #ef4444;
      --color-green:          #76b900;

      /* Status semantics (live/planned/gap reuse the brand hues) */
      --live:         var(--color-teal);
      --live-bg:      rgba(0,196,180,0.12);
      --live-border:  rgba(0,196,180,0.35);
      --planned:        var(--color-t3-blue);
      --planned-bg:     var(--color-t3-blue-dim);
      --planned-border: var(--color-t3-blue-border);
      --gap:        var(--color-red);
      --gap-bg:     rgba(239,68,68,0.12);
      --gap-border: rgba(239,68,68,0.35);

      /* Extra tinted marks for feature-lifecycle badges (idea/gap/in-progress/scoped/scored) */
      --color-amber-text:   var(--color-amber);
      --color-amber-bg:     rgba(245,158,11,0.12);
      --color-amber-border: rgba(245,158,11,0.35);
      --color-purple-text:   var(--color-purple);
      --color-purple-bg:     rgba(139,92,246,0.12);
      --color-purple-border: rgba(139,92,246,0.35);

      /* Sidebar - modeled on renewals-web-react's AppShell Drawer: a solid navy
         surface one step lighter than the page (NAVY_SURFACE), not a blurred
         overlay, with its own border tone (NAVY_BORDER) */
      --sidebar-bg:            #132337;
      --sidebar-border:        #1e3a5f;
      --sidebar-text:          rgba(255,255,255,0.65);
      --sidebar-text-active:   #f0f4ff;
      --sidebar-hover-bg:      rgba(0,163,255,0.08);
      --sidebar-section-color: rgba(255,255,255,0.35);

      --sidebar-width: 14rem;
      --radius: 10px;
      --font-display: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    :root[data-theme="light"] {
      --color-bg-base:        #f7f8fa;
      --color-bg-surface:     #eef2f7;
      --color-bg-card:        #ffffff;
      --color-bg-card-hover:  rgba(0,163,255,0.04);
      --color-border-subtle:  rgba(15,20,30,0.08);
      --color-border-muted:   rgba(15,20,30,0.14);
      --card-blur:            none;
      --card-shadow:          0 1px 3px rgba(15,20,30,0.06);

      --color-text-primary:   #0f172a;
      --color-text-secondary: #475569;
      --color-text-muted:     #7c8797;

      --color-t3-blue:        #0088d4;
      --color-t3-blue-dim:    rgba(0,136,212,0.12);
      --color-t3-blue-border: rgba(0,136,212,0.3);
      --color-teal:           #00897b;
      --color-amber:          #d97706;

      --live:         #0f766e;
      --live-bg:      rgba(0,137,123,0.12);
      --live-border:  rgba(0,137,123,0.35);
      --planned:        #0369a1;
      --planned-bg:     rgba(0,136,212,0.12);
      --planned-border: rgba(0,136,212,0.3);
      --gap:        #b91c1c;
      --gap-bg:     rgba(239,68,68,0.12);
      --gap-border: rgba(239,68,68,0.35);

      --color-amber-text:   #92400e;
      --color-amber-bg:     rgba(217,119,6,0.12);
      --color-amber-border: rgba(217,119,6,0.3);
      --color-purple-text:   #6d28d9;
      --color-purple-bg:     rgba(139,92,246,0.12);
      --color-purple-border: rgba(139,92,246,0.35);

      --sidebar-bg:            rgba(247,248,250,0.9);
      --sidebar-border:        rgba(15,20,30,0.08);
      --sidebar-text:          #475569;
      --sidebar-text-active:   #0f172a;
      --sidebar-hover-bg:      rgba(0,136,212,0.06);
      --sidebar-section-color: #7c8797;
    }

    html { font-size: clamp(13px, 1vw, 16px); }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-display);
      background: var(--color-bg-base);
      margin: 0;
      color: var(--color-text-primary);
      display: flex;
      min-height: 100vh;
      transition: background 0.15s, color 0.15s;
    }

    /* Sidebar - solid navy panel (renewals-web-react's Drawer), no blur */
    .sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text-active);
      border-right: 1px solid var(--sidebar-border);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-brand { padding: 1.25rem 1rem 1rem; font-size: 0.95rem; font-weight: 700; color: var(--sidebar-text-active); border-bottom: 1px solid var(--sidebar-border); line-height: 1.4; }
    .sidebar-brand small { display: block; font-family: var(--font-mono); font-size: 0.65rem; font-weight: 500; color: var(--sidebar-section-color); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
    nav { padding: 0.5rem 0; flex: 1; }
    nav a { display: block; padding: 0.5rem 1rem; color: var(--sidebar-text); text-decoration: none; font-size: 0.875rem; border-right: 3px solid transparent; transition: background 0.15s, color 0.15s; }
    nav a:hover { background: var(--sidebar-hover-bg); color: var(--sidebar-text-active); }
    nav a.active { color: var(--color-t3-blue); border-right-color: var(--color-t3-blue); background: var(--color-t3-blue-dim); font-weight: 500; }
    .nav-section { display: block; font-family: var(--font-mono); padding: 0.75rem 1rem 0.2rem; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sidebar-section-color); pointer-events: none; }
    .sidebar-footer { padding: 0.75rem 1rem; border-top: 1px solid var(--sidebar-border); display: flex; flex-direction: column; gap: 0.5rem; }

    .theme-toggle-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      width: 100%; padding: 0.4rem 0.75rem; border-radius: 5px; cursor: pointer;
      font-size: 0.72rem; font-weight: 600; font-family: inherit; letter-spacing: 0.02em;
      background: var(--sidebar-hover-bg); border: 1px solid var(--sidebar-border);
      color: var(--sidebar-text); transition: background 0.15s, color 0.15s;
    }
    .theme-toggle-btn:hover { background: var(--color-t3-blue-dim); color: var(--color-t3-blue); }
    .theme-toggle-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .theme-toggle-btn .icon-sun { display: none; }
    .theme-toggle-btn .icon-moon { display: block; }
    :root[data-theme="light"] .theme-toggle-btn .icon-sun { display: block; }
    :root[data-theme="light"] .theme-toggle-btn .icon-moon { display: none; }

    .sync-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.4rem 0.75rem; border-radius: 5px; cursor: pointer; font-size: 0.72rem;
      font-weight: 600; font-family: inherit; letter-spacing: 0.02em;
      background: var(--sidebar-hover-bg); border: 1px solid var(--sidebar-border);
      color: var(--sidebar-text); transition: background 0.15s, color 0.15s;
    }
    .sync-btn:hover { background: var(--color-t3-blue-dim); color: var(--color-t3-blue); }

    /* Main */
    .main { flex: 1; padding: 2rem; min-width: 0; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; margin: 0 0 0.25rem; font-weight: 700; color: var(--color-text-primary); }
    .page-header .subtitle { color: var(--color-text-secondary); font-size: 0.875rem; margin: 0; }

    /* Cards */
    .card {
      background: var(--color-bg-card); border-radius: var(--radius);
      border: 1px solid var(--color-border-subtle);
      backdrop-filter: var(--card-blur); -webkit-backdrop-filter: var(--card-blur);
      box-shadow: var(--card-shadow); padding: 1.25rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .card-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-secondary); margin: 0 0 0.75rem; }

    /* Stat blocks */
    .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-card {
      background: var(--color-bg-card); border-radius: var(--radius);
      border: 1px solid var(--color-border-subtle);
      backdrop-filter: var(--card-blur); -webkit-backdrop-filter: var(--card-blur);
      box-shadow: var(--card-shadow); padding: 1rem 1.25rem; flex: 1; min-width: 8rem;
    }
    .stat-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); margin: 0 0 0.3rem; }
    .stat-value { font-family: var(--font-mono); font-size: 2rem; font-weight: 700; line-height: 1; margin: 0; color: var(--color-text-primary); }
    .stat-value.live { color: var(--live); }
    .stat-value.planned { color: var(--planned); }
    .stat-value.gap { color: var(--gap); }

    /* Status badges */
    .badge { display: inline-block; font-family: var(--font-mono); padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
    .badge-live { background: var(--live-bg); color: var(--live); border-color: var(--live-border); }
    .badge-planned { background: var(--planned-bg); color: var(--planned); border-color: var(--planned-border); }
    .badge-gap { background: var(--gap-bg); color: var(--gap); border-color: var(--gap-border); }

    /* Progress bar */
    .progress-bar { height: 6px; background: var(--color-border-subtle); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--color-t3-blue), var(--color-teal)); transition: width 0.3s; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 1rem; border: none; border-radius: 6px; font-size: 0.875rem; cursor: pointer; font-weight: 500; text-decoration: none; transition: background 0.15s, color 0.15s, border-color 0.15s; }
    .btn-primary { background: linear-gradient(135deg, #0088d4, #00a3ff); color: #fff; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-success { background: var(--color-teal); color: #fff; }
    .btn-success:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border-muted); }
    .btn-ghost:hover { color: var(--color-t3-blue); border-color: var(--color-t3-blue-border); }
    .btn-danger { background: transparent; color: var(--color-red); border: 1px solid var(--color-red); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-secondary); background: var(--color-bg-surface); border-bottom: 2px solid var(--color-border-muted); white-space: nowrap; }
    td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--color-border-subtle); vertical-align: middle; color: var(--color-text-primary); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--color-bg-card-hover); }

    /* Status select */
    .status-select { font-family: var(--font-mono); padding: 0.2rem 0.5rem; border-radius: 999px; border: 1px solid transparent; font-size: 0.72rem; font-weight: 600; cursor: pointer; appearance: none; text-align: center; }
    .status-select.live { background: var(--live-bg); color: var(--live); border-color: var(--live-border); }
    .status-select.planned { background: var(--planned-bg); color: var(--planned); border-color: var(--planned-border); }
    .status-select.gap { background: var(--gap-bg); color: var(--gap); border-color: var(--gap-border); }

    /* Forms */
    .form-group { margin-bottom: 0.75rem; }
    label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 0.3rem; }
    input[type=text], input[type=number], textarea, select.form-select {
      width: 100%; padding: 0.45rem 0.65rem; border: 1px solid var(--color-border-muted); border-radius: 6px;
      font-size: 0.875rem; font-family: inherit; color: var(--color-text-primary); background: var(--color-bg-card);
    }
    input:focus, textarea:focus, select.form-select:focus { outline: none; border-color: var(--color-t3-blue); box-shadow: 0 0 0 3px var(--color-t3-blue-dim); }
    textarea { resize: vertical; min-height: 3rem; }

    /* Grid helpers */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    /* Misc */
    .text-muted { color: var(--color-text-muted); font-size: 0.8rem; }
    .wbs-code { font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text-secondary); white-space: nowrap; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--color-bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--color-t3-blue-dim); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-t3-blue-border); }

    /* Ambient blue grid glow (matches solution-analytics's AnimatedBackground) */
    .grid-bg {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,163,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,163,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 40%, transparent 100%);
    }
    .grid-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(0,163,255,0.08) 0%, transparent 60%);
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
<div class="grid-bg"></div>

{% if not embed_chrome %}
<aside class="sidebar">
  <a href="{{ base_path }}/switch-project" class="sidebar-brand" style="text-decoration:none;display:block;"
     title="{% if lock_project %}Project files{% else %}Switch project{% endif %}">
    <small>strategy-as-code</small>
    {{ app_title }}
  </a>
  <nav>
    <span class="nav-section">Planning</span>
    <a href="{{ base_path }}/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>Summary</a>
    <a href="{{ base_path }}/features" {% if active_page == 'features' %}class="active"{% endif %}>Features</a>
    <a href="{{ base_path }}/roadmap" {% if active_page == 'roadmap' %}class="active"{% endif %}>Roadmap</a>
    <a href="{{ base_path }}/structure" {% if active_page == 'structure' %}class="active"{% endif %}>Structure</a>
    <a href="{{ base_path }}/bugs" {% if active_page == 'bugs' %}class="active"{% endif %}>Bugs</a>
    <span class="nav-section">Reference</span>
    <a href="{{ base_path }}/registry" {% if active_page == 'registry' %}class="active"{% endif %}>Registry</a>
    <a href="{{ base_path }}/about" {% if active_page == 'about' %}class="active"{% endif %}>About</a>
    <a href="{{ base_path }}/readme" {% if active_page == 'readme' %}class="active"{% endif %}>README</a>
    {% if auth_enabled %}
    <span class="nav-section">Account</span>
    <a href="{{ base_path }}/logout">Sign Out</a>
    {% endif %}
  </nav>
  <div class="sidebar-footer">
    <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      <span>Theme</span>
    </button>
    {% if is_uploaded %}
    <button id="sync-btn" class="sync-btn" onclick="exportMarkdown()">
      ⬇ Export Markdown
    </button>
    {% endif %}
  </div>
</aside>
{% endif %}

<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
// Session injection: attach X-Session-ID to all /api/ requests
(function() {
  const _sid = () => sessionStorage.getItem('pac_session_id');
  const _orig = window.fetch;
  window.fetch = function(url, opts = {}) {
    const sid = _sid();
    if (sid && typeof url === 'string' && url.startsWith('{{ base_path }}/api/')) {
      opts = { ...opts, headers: { ...(opts.headers || {}), 'X-Session-ID': sid } };
    }
    return _orig.call(this, url, opts).then(resp => {
      if (resp.status === 401) {
        resp.clone().json().then(d => {
          if (d.detail === 'session_expired') {
            sessionStorage.removeItem('pac_session_id');
            window.location.href = '{{ base_path }}/switch-project';
          }
        }).catch(() => {});
      }
      return resp;
    });
  };
  // Inject into HTMX requests too
  document.addEventListener('htmx:configRequest', function(e) {
    const sid = _sid();
    if (sid) e.detail.headers['X-Session-ID'] = sid;
  });
})();

function exportMarkdown() {
  const sid = sessionStorage.getItem('pac_session_id');
  const url = '{{ base_path }}/api/project/download';
  // For session-based downloads, need the header - use fetch + blob
  if (sid) {
    fetch(url, { headers: { 'X-Session-ID': sid } })
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'project.zip';
        a.click();
      });
  } else {
    window.location.href = url;
  }
}

// Theme engine: standalone mode persists to localStorage and toggles on click;
// embedded mode (host provides chrome) instead inherits the host's theme via
// postMessage. Envelope/source match renewals-web-react's actual
// SolutionAnalyticsAdminPage.tsx broadcast (the same mechanism it uses for
// solution-analytics), so this app follows suit when embedded the same way.
(function() {
  const EMBED_CHROME = {{ 'true' if embed_chrome else 'false' }};
  const STORAGE_KEY = 'strategy-as-code-theme';
  const HOST_MESSAGE_SOURCE = 'renewals-host';

  function applyTheme(mode) {
    if (mode === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }

  if (EMBED_CHROME) {
    // The host (renewals-web-react) posts {source: 'renewals-host', type: 'theme', mode: 'light'|'dark'}
    // into this iframe whenever its own theme changes (and once on load).
    window.addEventListener('message', function(e) {
      if (e.origin !== window.location.origin) return;
      const data = e.data;
      if (data && typeof data === 'object' && data.source === HOST_MESSAGE_SOURCE && data.type === 'theme') {
        applyTheme(data.mode === 'light' ? 'light' : 'dark');
      }
    });
  } else {
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        const next = current === 'light' ? 'dark' : 'light';
        applyTheme(next);
        try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
      });
    }
  }
})();

{% if not embed_chrome %}
(function() {
  const es = new EventSource('{{ base_path }}/api/events');
  es.onmessage = (e) => {
    if (e.data !== 'changed') return;
    const panel = document.getElementById('featurePanel');
    if (panel && panel.open) return;
    location.reload();
  };
  es.onerror = () => es.close();
})();
{% endif %}
</script>
</body>
</html>
