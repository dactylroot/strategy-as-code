<div class="fc" id="fc-planned-{{ item.wbs | replace('.', '-') }}"
     style="cursor:pointer;"
     data-source="product"
     data-wbs="{{ item.wbs }}"
     data-name="{{ item.name }}"
     data-notes="{{ item.notes }}"
     data-stage="Planned"
     data-flagged="{{ item.flagged | lower }}"
     data-owner="{{ item.owner or '' }}"
     data-uat-confirmed="{{ item.uat_confirmed | lower }}"
     onclick="openFeaturePanelFromEl(this)">
  <div class="fc-head">
    <div class="fc-meta">
      <span class="fc-wbs" style="background:var(--planned-bg);color:var(--planned);">{{ item.wbs }}</span>
      <span class="fc-stage-badge" style="color:var(--planned);">Planned</span>
    </div>
    <div class="fc-title">{{ item.name }}</div>
    {% if item.notes %}<div class="fc-notes">{{ item.notes | replace("<br>", " ") | truncate(120, true, "…") }}</div>{% endif %}
    <div class="fc-actions">
      <span class="text-muted" style="font-size:0.7rem;">Click to review →</span>
    </div>
  </div>
</div>
