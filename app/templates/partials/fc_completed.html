<div class="fc" id="fc-completed-{{ item.wbs | replace('.', '-') }}" style="opacity:0.75;">
  <div class="fc-head">
    <div class="fc-meta">
      <span class="fc-wbs" style="background:var(--live-bg);color:var(--live);">{{ item.wbs }}</span>
      <span class="fc-stage-badge" style="color:var(--live);">✓ Live</span>
    </div>
    <div class="fc-title" style="color:var(--color-text-secondary);">{{ item.name }}</div>
  </div>
</div>
