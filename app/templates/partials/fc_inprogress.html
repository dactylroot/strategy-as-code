<div class="fc" id="fc-inprogress-{{ item.wbs | replace('.', '-') }}"
     style="cursor:pointer;"
     data-source="product"
     data-wbs="{{ item.wbs }}"
     data-name="{{ item.name }}"
     data-notes="{{ item.notes }}"
     data-stage="{{ item.status.value }}"
     data-value="{{ item.value or '' }}"
     data-effort="{{ item.effort or '' }}"
     data-flagged="{{ item.flagged | lower }}"
     onclick="openFeaturePanelFromEl(this)">
  <div class="fc-head">
    <div class="fc-meta">
      <span class="fc-wbs" style="background:#fff7ed;color:#92400e;">{{ item.wbs }}</span>
      <span class="fc-stage-badge" style="color:#f59e0b;">In Progress</span>
    </div>
    <div class="fc-title">{{ item.name }}</div>
    {% if item.notes %}<div class="fc-notes">{{ item.notes | replace("<br>", " ") | truncate(120, true, "…") }}</div>{% endif %}
    <div class="fc-actions" onclick="event.stopPropagation()">
      <button class="btn btn-success btn-sm"
              onclick="event.stopPropagation();completeFeature('{{ item.wbs }}', this.closest('.fc').dataset.name)">
        → Complete
      </button>
    </div>
  </div>
</div>
