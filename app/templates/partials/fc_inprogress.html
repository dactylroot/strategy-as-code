<div class="fc" id="fc-inprogress-{{ item.wbs | replace('.', '-') }}"
     style="cursor:pointer;"
     data-source="product"
     data-wbs="{{ item.wbs }}"
     data-name="{{ item.name }}"
     data-notes="{{ item.notes }}"
     data-stage="{{ item.status.value }}"
     data-value="{{ item.value or '' }}"
     data-effort="{{ item.effort or '' }}"
     data-flagged="{{ item.flagged | lower }}"
     data-owner="{{ item.owner or '' }}"
     data-uat-confirmed="{{ item.uat_confirmed | lower }}"
     onclick="openFeaturePanelFromEl(this)">
  <div class="fc-head">
    <div class="fc-meta">
      <span class="fc-wbs" style="background:var(--color-amber-bg);color:var(--color-amber-text);">{{ item.wbs }}</span>
      <span class="fc-stage-badge" style="color:var(--color-amber-text);">In Progress</span>
    </div>
    <div class="fc-title">{{ item.name }}</div>
    {% if item.notes %}<div class="fc-notes">{{ item.notes | replace("<br>", " ") | truncate(120, true, "…") }}</div>{% endif %}
    <div class="fc-actions" onclick="event.stopPropagation()">
      {% if item.value and item.effort %}
      <span style="font-size:0.72rem;color:var(--color-text-secondary);">V:{{ item.value }} E:{{ item.effort }}</span>
      <span class="priority-badge">{{ '%.1f'|format(item.priority_score) }}</span>
      {% endif %}
      <button class="btn btn-success btn-sm" style="margin-left:auto;"
              onclick="event.stopPropagation();completeFeature('{{ item.wbs }}', this.closest('.fc').dataset.name)">
        → Complete
      </button>
    </div>
  </div>
</div>
