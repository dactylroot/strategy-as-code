<div class="fc" id="fc-scoped-{{ item.wbs | replace('.', '-') }}"
     style="cursor:pointer;"
     data-source="product"
     data-wbs="{{ item.wbs }}"
     data-name="{{ item.name }}"
     data-notes="{{ item.notes }}"
     data-stage="Scoped"
     data-raw-status="{{ item.status.value }}"
     data-flagged="{{ item.flagged | lower }}"
     onclick="openFeaturePanelFromEl(this)">
  <div class="fc-head">
    <div class="fc-meta">
      <span class="fc-wbs" style="background:#ede9fe;color:#5b21b6;">{{ item.wbs }}</span>
      <span class="fc-stage-badge" style="color:#5b21b6;">Scoped</span>
    </div>
    <div class="fc-title">{{ item.name }}</div>
    {% if item.notes %}<div class="fc-notes">{{ item.notes | replace("<br>", " ") | truncate(120, true, "…") }}</div>{% endif %}
    <div class="fc-actions" onclick="event.stopPropagation()">
      <button class="btn btn-primary btn-sm" style="margin-left:auto;"
              onclick="event.stopPropagation();startWork('{{ item.wbs }}', this.closest('.fc').dataset.name)">
        → In Progress
      </button>
    </div>
  </div>
</div>
