<div class="fc" id="fc-scoped-{{ item.wbs | replace('.', '-') }}"
     style="cursor:pointer;"
     data-source="product"
     data-wbs="{{ item.wbs }}"
     data-name="{{ item.name }}"
     data-notes="{{ item.notes }}"
     data-stage="Scoped"
     onclick="openFeaturePanelFromEl(this)">
  <div class="fc-head">
    <div class="fc-meta">
      <span class="fc-wbs" style="background:#ede9fe;color:#5b21b6;">{{ item.wbs }}</span>
      <span class="fc-stage-badge" style="color:#5b21b6;">Scoped</span>
    </div>
    <div class="fc-title">{{ item.name }}</div>
    {% if item.notes %}<div class="fc-notes">{{ item.notes }}</div>{% endif %}
    <div class="fc-actions">
      <span class="text-muted" style="font-size:0.7rem;">Click to score &amp; edit →</span>
    </div>
  </div>
</div>
